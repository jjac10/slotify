# Producción: usa las imágenes publicadas en GHCR (no compila aquí). Postgres NO se
# expone a internet; Caddy es el único que abre 80/443 y gestiona el HTTPS automático.
# Variables sensibles → /opt/slotify/.env en el VPS (ver docs/DEPLOY.md).
services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [slotify]
    # Sin 'ports': la BD solo es accesible dentro de la red de Docker.

  backend:
    image: ghcr.io/jjac10/slotify-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};"
      Jwt__Key: ${JWT_KEY}
      Crypto__EncryptionKey: ${CRYPTO_ENCRYPTION_KEY}
      Crypto__BlindIndexKey: ${CRYPTO_BLIND_INDEX_KEY}
      Cors__AllowedOrigins__0: "https://${DOMAIN}"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [slotify]
    # Las migraciones de EF Core corren solas al arrancar (Program.cs → db.Database.Migrate()).

  frontend:
    image: ghcr.io/jjac10/slotify-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on: [backend]
    networks: [slotify]
    # nginx sirve la SPA y reenvía /api → backend:8080 (infra/nginx.conf).

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [frontend]
    networks: [slotify]

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  slotify:
    driver: bridge
