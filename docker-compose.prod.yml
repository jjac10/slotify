# Producción. Slotify se enchufa al Traefik ya existente del VPS: red externa
# 'traefik_net', entrypoint 'websecure' y resolver de Let's Encrypt 'letsencrypt'.
# Traefik enruta DOMAIN → frontend (nginx) → backend → postgres. Postgres NO se expone.
# Secretos → /opt/slotify/.env (ver docs/DEPLOY.md).
services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  backend:
    image: ghcr.io/jjac10/slotify-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};"
      Jwt__Key: ${JWT_KEY}
      Crypto__EncryptionKey: ${CRYPTO_ENCRYPTION_KEY}
      Crypto__BlindIndexKey: ${CRYPTO_BLIND_INDEX_KEY}
      Cors__AllowedOrigins__0: "https://${DOMAIN}"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]
    # Las migraciones de EF Core corren solas al arrancar (Program.cs → db.Database.Migrate()).

  frontend:
    image: ghcr.io/jjac10/slotify-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on: [backend]
    networks: [internal, traefik_net]   # 'internal' para hablar con el backend; 'traefik_net' para que Traefik lo alcance
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_net"
      - "traefik.http.routers.slotify.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.slotify.entrypoints=websecure"
      - "traefik.http.routers.slotify.tls=true"
      - "traefik.http.routers.slotify.tls.certresolver=letsencrypt"
      - "traefik.http.services.slotify.loadbalancer.server.port=80"

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
  traefik_net:
    external: true
