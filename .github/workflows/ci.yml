name: CI

# Build + test en cada push y PR a las ramas principales.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancela ejecuciones previas de la misma rama/PR si llega un push nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # --- Backend: xUnit + Moq + Testcontainers (PostgreSQL) + WebApplicationFactory ---
  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore backend/Slotify.slnx

      - name: Build
        run: dotnet build backend/Slotify.slnx --no-restore -c Release

      # Testcontainers levanta PostgreSQL en Docker (disponible en el runner).
      - name: Test
        run: dotnet test backend/Slotify.slnx --no-build -c Release --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: '**/test-results.trx'
          if-no-files-found: ignore

  # --- Frontend: TypeScript strict + build de producción ---
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  # --- E2E: Playwright contra el stack real (backend en Docker + Vite) ---
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      # Levanta postgres + backend (mapea el backend a localhost:5000, como en local).
      - name: Start backend stack
        working-directory: .
        run: docker compose up -d --build backend

      - name: Wait for backend
        working-directory: .
        run: |
          for i in $(seq 1 60); do
            if [ "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:5000/openapi/v1.json)" = "200" ]; then
              echo "backend up"; exit 0
            fi
            sleep 2
          done
          echo "backend no respondió a tiempo"; docker compose logs backend; exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Playwright arranca su propio dev-server de Vite (reuseExistingServer=false en CI).
      - name: Run E2E
        run: npm run test:e2e

      - name: Backend logs on failure
        if: failure()
        working-directory: .
        run: docker compose logs backend

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: frontend/test-results/
          if-no-files-found: ignore

      - name: Stop stack
        if: always()
        working-directory: .
        run: docker compose down -v
