name: Deploy

# Se dispara cuando la CI (build + test + e2e) termina en 'main'. Solo despliega si
# pasó: así nunca sube a producción algo con los tests en rojo.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/Dockerfile.backend
          push: true
          tags: |
            ghcr.io/jjac10/slotify-backend:latest
            ghcr.io/jjac10/slotify-backend:${{ github.event.workflow_run.head_sha }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/Dockerfile.frontend
          push: true
          tags: |
            ghcr.io/jjac10/slotify-frontend:latest
            ghcr.io/jjac10/slotify-frontend:${{ github.event.workflow_run.head_sha }}

      # Sube el compose al VPS (los secretos viven en /opt/slotify/.env, no aquí).
      - name: Copy compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/opt/slotify"

      - name: Pull images & restart on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/slotify
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
