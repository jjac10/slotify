<script>
        // Micro-interaction for email toggle display
        const emailToggle = document.getElementById('email-toggle');
        const emailField = document.getElementById('email-field');
        
        emailToggle.addEventListener('click', () => {
            if (emailField.style.maxHeight === '0px' || emailField.style.maxHeight === '') {
                emailField.style.maxHeight = '100px';
                emailField.style.marginTop = '16px';
            } else {
                emailField.style.maxHeight = '0px';
                emailField.style.marginTop = '0px';
            }
        });

        // Time slot selection behavior
        const timeSlots = document.querySelectorAll('button.border-secondary');
        timeSlots.forEach(slot => {
            slot.addEventListener('click', () => {
                timeSlots.forEach(s => {
                    s.classList.remove('bg-secondary', 'text-white', 'shadow-md');
                    s.classList.add('text-secondary');
                });
                slot.classList.remove('text-secondary');
                slot.classList.add('bg-secondary', 'text-white', 'shadow-md');
            });
        });

        // Service card selection behavior
        const serviceCards = document.querySelectorAll('label.cursor-pointer');
        serviceCards.forEach(card => {
            card.addEventListener('click', () => {
                serviceCards.forEach(c => c.classList.remove('service-selected', 'border-brand-morado', 'bg-primary-container/5'));
                card.classList.add('service-selected', 'border-brand-morado', 'bg-primary-container/5');
            });
        });
    </script>
