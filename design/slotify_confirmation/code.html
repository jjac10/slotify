<!-- Success Confetti Overlay Script -->
<script>
        // Simple micro-interaction for the share button
        document.querySelector('button.bg-primary').addEventListener('click', function() {
            const originalText = this.innerHTML;
            this.innerHTML = '<span class="material-symbols-outlined text-[20px] animate-bounce">check</span> ¡Copiado!';
            setTimeout(() => {
                this.innerHTML = originalText;
            }, 2000);
        });

        // WhatsApp trigger placeholder
        document.querySelector('button.bg-\\[\\#25D366\\]').addEventListener('click', function() {
            console.log("Notificación de WhatsApp activada");
            this.style.opacity = '0.7';
            setTimeout(() => { this.style.opacity = '1'; }, 200);
        });
