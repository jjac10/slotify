<script>
        // Micro-interaction for list items
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', function() {
                this.classList.add('scale-[0.99]');
            });
            btn.addEventListener('touchend', function() {
                this.classList.remove('scale-[0.99]');
            });
        });

        // Simple animation logic for page entrance
        window.addEventListener('DOMContentLoaded', () => {
            const sections = document.querySelectorAll('section');
            sections.forEach((sec, idx) => {
                sec.style.opacity = '0';
                sec.style.transform = 'translateY(10px)';
                sec.style.transition = 'all 0.4s ease-out';
                setTimeout(() => {
                    sec.style.opacity = '1';
                    sec.style.transform = 'translateY(0)';
                }, 100 * idx);
            });
        });
    </script>
